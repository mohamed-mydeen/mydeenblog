<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      .logo-shape {
        fill: #0f172a;
        transition: fill 0.3s ease;
      }
      @media (prefers-color-scheme: dark) {
        .logo-shape {
          fill: #f8fafc;
        }
      }
    </style>
  </defs>
  <!-- Premium MNC-level Symmetrical MM Monogram -->
  <!-- Forms MM with a modern geometric slash and developer terminal chevrons -->
  <g transform="translate(24, 24)">
    <!-- First 'M' -->
    <path class="logo-shape" d="M 64 384 L 64 128 L 128 128 L 208 272 L 288 128 L 352 128 L 352 384 L 288 384 L 288 224 L 208 352 L 128 224 L 128 384 Z" opacity="0.9" />
    <!-- Second 'M' (Offset, overlaid with subtle opacity for depth and high-end technical design) -->
    <path class="logo-shape" d="M 176 384 L 176 128 L 240 128 L 320 272 L 400 128 L 464 128 L 464 384 L 400 384 L 400 224 L 320 352 L 240 224 L 240 384 Z" opacity="0.6" />
  </g>
</svg>
